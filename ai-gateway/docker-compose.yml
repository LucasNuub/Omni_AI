services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_gateway_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - gateway_db_data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_gateway_frontend
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Cloudflare Tunnel Service (Disabled by default)
  # Un-comment the block below to route your local gateway via a secure Cloudflare tunnel.
  # Make sure to run `docker compose up -d` after configuring your TUNNEL_TOKEN.
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: ai_gateway_tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=your-cloudflare-tunnel-token-here

volumes:
  gateway_db_data:
    driver: local
